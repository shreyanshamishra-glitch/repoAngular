<section class="panel" aria-labelledby="dummy-order-heading">
  <header class="panel-header">
    <h2 id="dummy-order-heading">Dummy Order Generator</h2>
    <p class="panel-subtitle">Populate the blotter for demo/testing</p>
  </header>

  <div class="tool-form">
    <label class="field">
      <span>Order count (max {{ store.maxPageSize() > 25 ? 25 : store.maxPageSize() }})</span>
      <input
        type="number"
        min="1"
        max="25"
        [ngModel]="count()"
        (ngModelChange)="count.set($event)"
      />
    </label>

    <label class="checkbox">
      <input
        type="checkbox"
        [ngModel]="useLiveQuotes()"
        (ngModelChange)="useLiveQuotes.set($event)"
      />
      Use live Alpha Vantage prices when available
    </label>

    <button
      type="button"
      class="btn-generate"
      (click)="generate()"
      [disabled]="store.loading()"
    >
      {{ store.loading() ? 'Generating…' : 'Generate Dummy Orders' }}
    </button>
  </div>
</section>
